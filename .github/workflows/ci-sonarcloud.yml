# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci-sonarcloud.yml
# Pipeline CI/CD con GitHub Actions + SonarCloud
#
# PROPÓSITO PEDAGÓGICO: Demuestra un pipeline completo con:
#   1. Instalación de dependencias
#   2. Ejecución de pruebas con cobertura
#   3. Análisis estático con SonarCloud
#   4. Quality Gate automático
#
# PRERREQUISITOS:
#   - Repositorio público en GitHub (SonarCloud gratuito para repos públicos)
#   - Cuenta en sonarcloud.io vinculada a GitHub
#   - Secreto SONAR_TOKEN configurado en GitHub → Settings → Secrets
# ─────────────────────────────────────────────────────────────────────────────

name: CI Pipeline - Calidad de Software

# ── DISPARADORES DEL PIPELINE ────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

# ── JOBS DEL PIPELINE ────────────────────────────────────────────────────────
jobs:

  # ── JOB 1: PRUEBAS Y COBERTURA ─────────────────────────────────────────────
  test:
    name: "🧪 Pruebas Unitarias y Cobertura"
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clonar el repositorio completo
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 → historial completo (necesario para SonarCloud)
          fetch-depth: 0

      # Paso 2: Configurar Python
      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Paso 3: Instalar dependencias de desarrollo
      - name: "📦 Instalar dependencias"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Paso 4: Ejecutar pruebas y generar reporte de cobertura
      - name: "🔬 Ejecutar pytest con cobertura"
        run: |
          python -m pytest \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v
        # El pipeline continúa aunque los tests fallen
        # (SonarQube necesita ver el reporte de cobertura de todos modos)
        continue-on-error: false

      # Paso 5: Subir reporte de cobertura como artefacto
      - name: "📊 Subir reporte de cobertura"
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── JOB 2: ANÁLISIS SONARCLOUD ─────────────────────────────────────────────
  sonarcloud:
    name: "🔍 Análisis SonarCloud"
    runs-on: ubuntu-latest
    # Este job depende de que las pruebas terminen primero
    needs: test

    steps:
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Instalar dependencias"
        run: |
          pip install -r requirements-dev.txt

      # Regenerar cobertura (necesario para que SonarCloud la procese)
      - name: "🔬 Regenerar reporte de cobertura"
        run: |
          python -m pytest \
            --cov=src \
            --cov-report=xml:coverage.xml \
            -q

      # Paso clave: Análisis con SonarCloud
      - name: "🔍 SonarCloud Scan"
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          # SONAR_TOKEN: token generado en sonarcloud.io
          # Configurar en: GitHub repo → Settings → Secrets → Actions
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

      # Quality Gate: falla el pipeline si el QG no pasa
      - name: "✅ Verificar Quality Gate"
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
