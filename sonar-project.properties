# ─────────────────────────────────────────────────────────────────────────────
# sonar-project.properties
# Configuración del proyecto para SonarQube / SonarCloud
# Curso: Especialidad I - Calidad de Software
# ─────────────────────────────────────────────────────────────────────────────

# Identificador único del proyecto en SonarQube/SonarCloud

# Nombre visible en el dashboard
sonar.projectName=cicd_calidad

# Versión del proyecto (actualizar por sprint/release)
sonar.projectVersion=1.0

# Directorio raíz del código fuente a analizar
sonar.sources=src

# Directorio de pruebas (SonarQube las trata diferente)
sonar.tests=tests

# Reporte de cobertura generado por pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Versión de Python del proyecto
sonar.python.version=3.11

# Exclusiones: archivos que NO deben analizarse
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/migrations/**

# Exclusiones de cobertura: archivos que no cuentan en el coverage
sonar.coverage.exclusions=tests/**,**/conftest.py

# Codificación del código fuente
sonar.sourceEncoding=UTF-8

# ─── PARA SONARCLOUD SOLAMENTE ───────────────────────────────────────────────
# Descomentar estas líneas si usas SonarCloud (nube)
sonar.projectKey=pipe613_cicd_calidad2
sonar.organization=pipe613

# ─── PARA SONARQUBE LOCAL SOLAMENTE ──────────────────────────────────────────
# Descomentar si no usas variables de entorno
# sonar.host.url=http://localhost:9000
# sonar.login=TU_TOKEN_AQUI
